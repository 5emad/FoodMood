name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build portable package
        run: |
          bash deploy/make-package.sh
          PKG="$(ls -1 dist/food-install-*.tar.gz | tail -1)"
          echo "PACKAGE=${PKG}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FoodMood ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.PACKAGE }}
